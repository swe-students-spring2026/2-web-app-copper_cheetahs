{% extends 'base.html' %} {% block stylesheets %}
<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/task_info.css') }}"
/>
{% endblock %} {% block container %}
<div class="edit-box">
  <h1>Edit Task</h1>

  <form method="post" action="{{ url_for('edit_task_post', project_id=project_id, task_id=task._id) }}">
    <div>
        <label for="title">Title</label>
        <input id="title" name="title" type="text" value="{{ task.name }}"/>
    </div>

    <div>
        <label for="description">Description</label>
        <textarea id="description" name="description">{{ task.description }}</textarea>
    </div>

    <div>
        <label for="due_date">Due Date</label>
        <input id="due_date" name="due_date" type="date" 
          value="{{ task.due_date.strftime('%Y-%m-%d') if task.due_date and task.due_date.__class__.__name__ == 'datetime' else task.due_date }}"
        />
    </div>

    <div>
        <label for="priority">Priority</label>
        <select id="priority" name="priority">
          <option value="High" {% if task.priority == "High" %}selected{% endif %}>High</option>
          <option value="Medium" {% if task.priority == "Medium" %}selected{% endif %}>Medium</option>
          <option value="Low" {% if task.priority == "Low" %}selected{% endif %}>Low</option>
        </select>
    </div>

    <div>
        <label for="status">Status</label>
        <select id="status" name="status">
            <option value="Todo" {% if task.status == "Todo" %}selected{% endif %}>Todo</option>
            <option value="In Progress" {% if task.status == "In Progress" %}selected{% endif %}>In Progress</option>
            <option value="Completed" {% if task.status == "Completed" %}selected{% endif %}>Completed</option>
        </select>
    </div>

    <div>
        <label for="assigned">Assigned</label>
        <select id="assigned" name="assigned" multiple>
            <option value="Developer 1" {% if task.assigned and 'Developer 1' in task.assigned %}selected{% endif %}>Developer 1</option>
            <option value="Developer 2" {% if task.assigned and 'Developer 2' in task.assigned %}selected{% endif %}>Developer 2</option>
            <option value="Developer 3" {% if task.assigned and 'Developer 3' in task.assigned %}selected{% endif %}>Developer 3</option>
        </select>
    </div>

    <button type="submit">Save changes</button>
  </form>

  <a href="{{ url_for('delete_task_confirm', project_id=project_id, task_id=task._id) }}">
    <button type="button">Delete</button>
  </a>
</div>
{% endblock %}
