{% extends 'base.html' %} {% block stylesheets %}
<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/task_info.css') }}"
/>
{% endblock %} {% block container %}
<div class="edit-box">
  <h1>Edit Project</h1>

  <form
    method="post"
    action="{{ url_for('edit_project_post', project_id=project_id) }}"
  >
    <div>
      <label for="title">Title</label>
      <input id="title" name="title" type="text" value="{{ project.name }}" />
    </div>

    <div>
      <label for="description">Description</label>
      <textarea id="description" name="description">
{{ project.description }}</textarea
      >
    </div>

    <div>
      <label for="assigned">Assigned Devs</label>
      <textarea id="assigned" name="assigned">{{ project.assigned }}</textarea>
    </div>

    <button type="submit">Save changes</button>
  </form>

  <a href="{{ url_for('delete_project_confirm', project_id=project_id) }}">
    <button type="button">Delete</button>
  </a>
</div>
{% endblock %}
